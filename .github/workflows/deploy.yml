name: Build and Deploy

on:
  push:
    branches: [sharpapp]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/miniblog

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.IMAGE }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - name: Ensure deploy directory exists on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: mkdir -p /opt/miniblog

      - name: Copy compose file to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.yml"
          target: /opt/miniblog

      - name: Pull image and restart container
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cd /opt/miniblog
            GITHUB_USERNAME=${{ github.repository_owner }} DB_PASSWORD=${{ secrets.DB_PASSWORD }} BLOG_USERNAME=${{ secrets.BLOG_USERNAME }} BLOG_PASSWORD=${{ secrets.BLOG_PASSWORD }} BLOG_SALT=${{ secrets.BLOG_SALT }} docker compose pull
            GITHUB_USERNAME=${{ github.repository_owner }} DB_PASSWORD=${{ secrets.DB_PASSWORD }} BLOG_USERNAME=${{ secrets.BLOG_USERNAME }} BLOG_PASSWORD=${{ secrets.BLOG_PASSWORD }} BLOG_SALT=${{ secrets.BLOG_SALT }} docker compose up -d --remove-orphans
            docker image prune -f
